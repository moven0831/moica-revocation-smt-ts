name: Update SMT
on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch: {}

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Fetch CRL
        id: fetch
        run: pnpm tsx src/fetch-crl.ts

      - name: Build SMT
        if: steps.fetch.outputs.changed == 'true'
        run: pnpm tsx src/build-smt.ts

      - name: Commit data
        if: steps.fetch.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "update: CRL data $(date -u +%Y%m%d%H%M)"
          git push

      - name: Upload snapshot
        if: steps.fetch.outputs.changed == 'true'
        run: |
          gh release delete snapshot-latest --yes || true
          assets=""
          for gen in g2 g3; do
            src="data/${gen}/tree-snapshot.json.gz"
            if [ -f "$src" ]; then
              dest="data/${gen}/${gen}-tree-snapshot.json.gz"
              cp "$src" "$dest"
              assets="$assets $dest"
            fi
          done
          if [ -n "$assets" ]; then
            gh release create snapshot-latest \
              --title "SMT Snapshot" \
              --notes "Auto-updated SMT snapshot $(date -u +%Y-%m-%dT%H:%M:%SZ)" \
              $assets
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Post root on-chain
        if: steps.fetch.outputs.changed == 'true'
        run: pnpm tsx src/post-root.ts
        env:
          RELAYER_PRIVATE_KEY: ${{ secrets.RELAYER_PRIVATE_KEY }}
          RPC_URL: ${{ secrets.RPC_URL }}
          CONTRACT_ADDRESS: ${{ secrets.CONTRACT_ADDRESS }}
